<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080608;
    --panel:   #0f0c10;
    --border:  #2e2233;
    --gold:    #c9a84c;
    --gold2:   #e8c96a;
    --text:    #c8b8a2;
    --dim:     #6a5a4a;
    --cell-empty:   #111018;
    --cell-player:  #1a1520;
    --cell-enemy:   #180a0a;
    --red:     #c0392b;
    --blue:    #2471a3;
    --green:   #1e8449;
  }

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
width: 100%; height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘Crimson Text’, serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
overflow: hidden;
user-select: none;
}

/* ── TOP BAR ── */
.topbar {
width: 100%;
max-width: 400px;
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 14px 6px;
border-bottom: 1px solid var(–border);
}

.hero-info {
display: flex;
align-items: center;
gap: 8px;
}

.hero-avatar {
font-size: 26px;
filter: drop-shadow(0 0 6px #c9a84c88);
}

.hero-name {
font-family: ‘Cinzel’, serif;
font-size: 11px;
color: var(–gold);
letter-spacing: 1px;
}

.bars {
display: flex;
flex-direction: column;
gap: 3px;
margin-top: 2px;
}

.bar-row {
display: flex;
align-items: center;
gap: 5px;
}

.bar-label {
font-size: 9px;
color: var(–dim);
width: 16px;
letter-spacing: 1px;
}

.bar-track {
width: 70px;
height: 5px;
background: #1a1420;
border: 1px solid var(–border);
overflow: hidden;
}

.bar-fill {
height: 100%;
transition: width 0.4s ease;
}

.bar-fill.hp { background: linear-gradient(90deg, #7b241c, #c0392b); }
.bar-fill.mp { background: linear-gradient(90deg, #1a5276, #2471a3); }

.turn-badge {
font-family: ‘Cinzel’, serif;
font-size: 9px;
letter-spacing: 2px;
color: var(–gold);
border: 1px solid var(–border);
padding: 4px 8px;
opacity: 0.8;
}

/* ── GRID ── */
.grid-wrap {
width: 100%;
max-width: 400px;
padding: 12px 10px 8px;
flex-shrink: 0;
}

.grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
grid-template-rows: repeat(5, 1fr);
gap: 3px;
aspect-ratio: 1;
width: 100%;
}

.cell {
aspect-ratio: 1;
background: var(–cell-empty);
border: 1px solid #1e1825;
display: flex;
align-items: center;
justify-content: center;
position: relative;
cursor: pointer;
transition: background 0.15s, border-color 0.15s;
overflow: hidden;
}

/* subtle texture */
.cell::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at 30% 30%, #ffffff06 0%, transparent 70%);
pointer-events: none;
}

.cell-icon {
font-size: clamp(20px, 6vw, 30px);
position: relative;
z-index: 1;
transition: transform 0.2s;
}

/* States */
.cell.player {
background: #1c1828;
border-color: var(–gold);
box-shadow: inset 0 0 12px #c9a84c22, 0 0 8px #c9a84c22;
}

.cell.player .cell-icon {
filter: drop-shadow(0 0 6px #c9a84caa);
animation: float 2.5s ease-in-out infinite;
}

.cell.enemy {
background: #180e0e;
border-color: #5a1a1a;
}

.cell.enemy .cell-icon {
filter: drop-shadow(0 0 4px #c0392b88);
animation: menace 2s ease-in-out infinite;
}

.cell.reachable {
border-color: #c9a84c66;
background: #181522;
cursor: pointer;
}

.cell.reachable::after {
content: ‘’;
position: absolute;
inset: 3px;
border: 1px solid #c9a84c44;
animation: pulse 1.5s ease-in-out infinite;
pointer-events: none;
}

.cell.reachable:active {
background: #221d30;
}

.cell.empty-floor {
background: #0d0b12;
}

.cell.wall {
background: #0a0810;
border-color: #150f1e;
cursor: default;
}

@keyframes float {
0%,100% { transform: translateY(0); }
50%      { transform: translateY(-3px); }
}

@keyframes menace {
0%,100% { transform: scale(1); }
50%      { transform: scale(1.08); }
}

@keyframes pulse {
0%,100% { opacity: 0.3; }
50%      { opacity: 0.9; }
}

/* move flash */
@keyframes moveIn {
0%   { transform: scale(0.7); opacity: 0.5; }
60%  { transform: scale(1.15); }
100% { transform: scale(1); opacity: 1; }
}

.cell.just-moved .cell-icon { animation: moveIn 0.25s ease-out; }

/* ── LOG ── */
.log-area {
width: 100%;
max-width: 400px;
padding: 0 10px;
flex-shrink: 0;
}

.log-box {
background: var(–panel);
border: 1px solid var(–border);
border-top: 1px solid #c9a84c22;
padding: 8px 10px;
min-height: 44px;
}

.log-latest {
font-size: 13px;
color: var(–text);
line-height: 1.4;
}

.log-prev {
font-size: 11px;
color: var(–dim);
font-style: italic;
margin-top: 2px;
}

/* ── D-PAD ── */
.dpad-area {
width: 100%;
max-width: 400px;
padding: 10px 14px 14px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
}

.dpad {
display: grid;
grid-template-columns: repeat(3, 44px);
grid-template-rows: repeat(3, 44px);
gap: 3px;
}

.dpad-btn {
background: #130f1a;
border: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
cursor: pointer;
color: var(–dim);
transition: background 0.1s, color 0.1s, border-color 0.1s;
-webkit-tap-highlight-color: transparent;
border-radius: 2px;
}

.dpad-btn:active, .dpad-btn.pressed {
background: #1e1830;
border-color: var(–gold);
color: var(–gold);
}

.dpad-center {
background: #0d0b12;
border-color: #1a1525;
cursor: default;
font-size: 10px;
color: #2a2235;
font-family: ‘Cinzel’, serif;
}

.dpad-empty {
background: transparent;
border-color: transparent;
pointer-events: none;
}

/* ── SPELL BUTTONS ── */
.spells {
display: flex;
flex-direction: column;
gap: 5px;
}

.spell-btn {
background: #0f0d18;
border: 1px solid var(–border);
padding: 6px 10px;
display: flex;
align-items: center;
gap: 7px;
cursor: pointer;
transition: background 0.15s, border-color 0.15s;
min-width: 100px;
border-radius: 2px;
}

.spell-btn:active {
background: #1a1628;
border-color: var(–gold);
}

.spell-icon { font-size: 18px; }

.spell-info {
display: flex;
flex-direction: column;
}

.spell-name {
font-family: ‘Cinzel’, serif;
font-size: 9px;
color: var(–gold);
letter-spacing: 1px;
}

.spell-cost {
font-size: 9px;
color: var(–blue);
letter-spacing: 1px;
}

.spell-btn.disabled {
opacity: 0.35;
pointer-events: none;
}

/* ── COORD TAG ── */
.coord-tag {
position: absolute;
bottom: 2px;
right: 3px;
font-family: ‘Cinzel’, serif;
font-size: 7px;
color: #2a2235;
pointer-events: none;
z-index: 2;
}

/* enemy hp dot */
.enemy-hp {
position: absolute;
top: 3px;
left: 3px;
display: flex;
gap: 2px;
z-index: 2;
}

.hp-dot {
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–red);
}

.hp-dot.lost {
background: #3a1a1a;
}

/* title strip */
.title-strip {
font-family: ‘Cinzel’, serif;
font-size: 8px;
letter-spacing: 4px;
color: var(–dim);
padding: 6px 0 0;
opacity: 0.5;
}
</style>

</head>
<body>

<div class="title-strip">TOWER OF NECROMANCY · ARENA</div>

<!-- TOP BAR -->

<div class="topbar">
  <div class="hero-info">
    <div class="hero-avatar">🧙</div>
    <div>
      <div class="hero-name">Aelindra</div>
      <div class="bars">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-track"><div class="bar-fill hp" id="hp-bar" style="width:100%"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">MP</span>
          <div class="bar-track"><div class="bar-fill mp" id="mp-bar" style="width:100%"></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="turn-badge" id="turn-badge">TWOJA TURA</div>
</div>

<!-- GRID -->

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- LOG -->

<div class="log-area">
  <div class="log-box">
    <div class="log-latest" id="log-latest">Wkraczasz na arenę... Przeciwnicy czekają.</div>
    <div class="log-prev" id="log-prev"></div>
  </div>
</div>

<!-- CONTROLS -->

<div class="dpad-area">
  <!-- D-PAD -->
  <div class="dpad">
    <div class="dpad-btn dpad-empty"></div>
    <div class="dpad-btn" id="btn-up"   ontouchstart="move(-1,0)" onclick="move(-1,0)">▲</div>
    <div class="dpad-btn dpad-empty"></div>
    <div class="dpad-btn" id="btn-left" ontouchstart="move(0,-1)" onclick="move(0,-1)">◀</div>
    <div class="dpad-btn dpad-center">✦</div>
    <div class="dpad-btn" id="btn-right"ontouchstart="move(0,1)"  onclick="move(0,1)">▶</div>
    <div class="dpad-btn dpad-empty"></div>
    <div class="dpad-btn" id="btn-down" ontouchstart="move(1,0)"  onclick="move(1,0)">▼</div>
    <div class="dpad-btn dpad-empty"></div>
  </div>

  <!-- SPELLS -->

  <div class="spells">
    <div class="spell-btn" onclick="castSpell('fire')" ontouchstart="castSpell('fire')">
      <span class="spell-icon">🔥</span>
      <div class="spell-info">
        <span class="spell-name">OGIEŃ</span>
        <span class="spell-cost">15 MP</span>
      </div>
    </div>
    <div class="spell-btn" onclick="castSpell('ice')" ontouchstart="castSpell('ice')">
      <span class="spell-icon">🧊</span>
      <div class="spell-info">
        <span class="spell-name">LÓD</span>
        <span class="spell-cost">10 MP</span>
      </div>
    </div>
    <div class="spell-btn" onclick="castSpell('lightning')" ontouchstart="castSpell('lightning')">
      <span class="spell-icon">⚡</span>
      <div class="spell-info">
        <span class="spell-name">BŁYSK</span>
        <span class="spell-cost">20 MP</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
const GRID_SIZE = 5;

// cell types: 'floor', 'wall'
const LAYOUT = [
  ['floor','floor','floor','floor','floor'],
  ['floor','wall', 'floor','wall', 'floor'],
  ['floor','floor','floor','floor','floor'],
  ['floor','wall', 'floor','wall', 'floor'],
  ['floor','floor','floor','floor','floor'],
];

let player = { row: 4, col: 2, hp: 100, mp: 100, maxHp: 100, maxMp: 100 };

let enemies = [
  { id: 'e1', row: 0, col: 1, icon: '💀', name: 'Szkielet',  hp: 3, maxHp: 3 },
  { id: 'e2', row: 0, col: 3, icon: '🧟', name: 'Zombie',    hp: 4, maxHp: 4 },
  { id: 'e3', row: 1, col: 2, icon: '👻', name: 'Zjawa',     hp: 2, maxHp: 2 },
];

let logLines = ['Wkraczasz na arenę... Przeciwnicy czekają.'];
let justMoved = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getEnemy(r, c) {
  return enemies.find(e => e.row === r && e.col === c);
}

function isReachable(r, c) {
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
  if (LAYOUT[r][c] === 'wall') return false;
  if (getEnemy(r, c)) return false;
  const dr = Math.abs(r - player.row);
  const dc = Math.abs(c - player.col);
  return (dr + dc === 1); // orthogonal only
}

function addLog(msg, prev) {
  document.getElementById('log-latest').textContent = msg;
  document.getElementById('log-prev').textContent = prev || logLines[logLines.length - 1] || '';
  logLines.push(msg);
}

function updateBars() {
  document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('mp-bar').style.width = (player.mp / player.maxMp * 100) + '%';
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const div = document.createElement('div');
      const enemy = getEnemy(r, c);
      const isPlayer = player.row === r && player.col === c;
      const isWall = LAYOUT[r][c] === 'wall';
      const canReach = isReachable(r, c);
      const wasJustMoved = justMoved && justMoved.r === r && justMoved.c === c;

      div.className = 'cell ' + (
        isPlayer ? 'player' :
        enemy    ? 'enemy' :
        isWall   ? 'wall' :
        canReach ? 'reachable' :
        'empty-floor'
      );

      if (wasJustMoved) div.classList.add('just-moved');

      // Icon
      let icon = '';
      if (isPlayer) icon = '🧙';
      else if (enemy) icon = enemy.icon;
      else if (isWall) icon = '🪨';

      if (icon) {
        div.innerHTML = `<span class="cell-icon">${icon}</span>`;
      }

      // Enemy HP dots
      if (enemy) {
        let dots = '';
        for (let i = 0; i < enemy.maxHp; i++) {
          dots += `<div class="hp-dot ${i >= enemy.hp ? 'lost' : ''}"></div>`;
        }
        div.innerHTML += `<div class="enemy-hp">${dots}</div>`;
      }

      // Coord tag
      div.innerHTML += `<div class="coord-tag">${c}${r}</div>`;

      // Click to move
      if (canReach) {
        div.addEventListener('click', () => move(r - player.row, c - player.col));
      }

      grid.appendChild(div);
    }
  }

  updateBars();
}

// ── MOVEMENT ─────────────────────────────────────────────────────────────────
function move(dr, dc) {
  const nr = player.row + dr;
  const nc = player.col + dc;

  if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) {
    addLog('Nie możesz tam iść.');
    return;
  }
  if (LAYOUT[nr][nc] === 'wall') {
    addLog('Droga zablokowana... Ściana.');
    return;
  }

  const enemy = getEnemy(nr, nc);
  if (enemy) {
    // Melee bump attack
    const dmg = 1;
    enemy.hp -= dmg;
    addLog(`Uderzasz ${enemy.name} z bliska! (-${dmg} HP)`);
    if (enemy.hp <= 0) {
      enemies = enemies.filter(e => e.id !== enemy.id);
      addLog(`${enemy.name} pada!`, `Uderzasz ${enemy.name} z bliska! (-${dmg} HP)`);
      if (enemies.length === 0) {
        setTimeout(() => addLog('🏆 Wszyscy wrogowie pokonani!'), 300);
      }
    }
    render();
    enemyTurn();
    return;
  }

  player.row = nr;
  player.col = nc;
  justMoved = { r: nr, c: nc };
  setTimeout(() => { justMoved = null; }, 300);

  addLog(`Przesuwasz się na [${nc}, ${nr}]`);
  render();
  enemyTurn();
}

// ── SPELLS ───────────────────────────────────────────────────────────────────
const SPELLS = {
  fire:      { name: 'Ogień',       cost: 15, dmg: 3, range: 2, icon: '🔥' },
  ice:       { name: 'Lód',         cost: 10, dmg: 2, range: 1, icon: '🧊' },
  lightning: { name: 'Błyskawica',  cost: 20, dmg: 4, range: 3, icon: '⚡' },
};

function castSpell(type) {
  const spell = SPELLS[type];
  if (player.mp < spell.cost) {
    addLog(`Za mało many! Potrzebujesz ${spell.cost} MP.`);
    return;
  }

  // Find closest enemy in range
  let target = null;
  let minDist = Infinity;
  for (const e of enemies) {
    const dist = Math.abs(e.row - player.row) + Math.abs(e.col - player.col);
    if (dist <= spell.range && dist < minDist) {
      minDist = dist;
      target = e;
    }
  }

  if (!target) {
    addLog(`${spell.icon} Brak celu w zasięgu ${spell.range} pól!`);
    return;
  }

  player.mp = Math.max(0, player.mp - spell.cost);
  target.hp -= spell.dmg;

  addLog(`${spell.icon} ${spell.name} trafia ${target.name}! (-${spell.dmg} HP)`);

  if (target.hp <= 0) {
    enemies = enemies.filter(e => e.id !== target.id);
    setTimeout(() => {
      addLog(`💀 ${target.name} zostaje zniszczony!`, `${spell.icon} ${spell.name} trafia ${target.name}! (-${spell.dmg} HP)`);
      if (enemies.length === 0) {
        setTimeout(() => addLog('🏆 Wszyscy wrogowie pokonani!'), 400);
      }
      render();
    }, 200);
  }

  render();
  enemyTurn();
}

// ── ENEMY AI (simple) ────────────────────────────────────────────────────────
function enemyTurn() {
  if (enemies.length === 0) return;

  setTimeout(() => {
    for (const e of enemies) {
      const dr = player.row - e.row;
      const dc = player.col - e.col;
      const dist = Math.abs(dr) + Math.abs(dc);

      if (dist === 1) {
        // Attack player
        const dmg = 5;
        player.hp = Math.max(0, player.hp - dmg);
        addLog(`${e.icon} ${e.name} atakuje! (-${dmg} HP)`);
        if (player.hp <= 0) {
          setTimeout(() => addLog('💀 Aelindra upada... Gra skończona.'), 300);
        }
      } else {
        // Move toward player
        let moved = false;
        const steps = Math.abs(dr) > Math.abs(dc)
          ? [{ r: Math.sign(dr), c: 0 }, { r: 0, c: Math.sign(dc) }]
          : [{ r: 0, c: Math.sign(dc) }, { r: Math.sign(dr), c: 0 }];

        for (const step of steps) {
          const nr = e.row + step.r;
          const nc = e.col + step.c;
          if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
          if (LAYOUT[nr][nc] === 'wall') continue;
          if (nr === player.row && nc === player.col) continue;
          if (getEnemy(nr, nc)) continue;
          e.row = nr;
          e.col = nc;
          moved = true;
          break;
        }
      }
    }
    render();
  }, 350);
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {
    'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
    'w':'up','s':'down','a':'left','d':'right'
  };
  const dir = map[e.key];
  if (!dir) return;
  e.preventDefault();
  const dirs = { up:[-1,0], down:[1,0], left:[0,-1], right:[0,1] };
  const [dr, dc] = dirs[dir];

  const btn = document.getElementById(`btn-${dir}`);
  if (btn) { btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 150); }

  move(dr, dc);
});

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>

</body>
</html>
